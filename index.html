<style>
  :root {
    --font-ui: 'Century Gothic', system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, Menlo, monospace;
    --ink: #1C1F1E;
    --carmine: #8C002A;
    --chalk: #F4F3F1;
  }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-ui); background: #F4F3F1; color: #2A2E2C; }
  #root { min-height: 100vh; }
  input:focus, textarea:focus, select:focus, button:focus { outline: 2px solid #8C002A; outline-offset: -1px; }
  .am-splash {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #8C002A; z-index: 9999; transition: opacity 0.3s ease;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 10px 10px;
  }
  .am-splash.hide { opacity: 0; pointer-events: none; }
  .am-splash-mark {
    font-family: 'Century Gothic', system-ui, sans-serif;
    color: #E8ECEA; font-weight: 300; text-transform: lowercase;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  .am-splash-sub { display: flex; align-items: center; gap: 4px; font-size: 22px; letter-spacing: 0.1em; }
  .am-splash-bkt { color: #FFFFFF; font-weight: 400; }
  .am-splash-text {
    color: rgba(255,255,255,0.55); font-size: 10px; margin-top: 12px;
    text-align: center; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600;
  }
</style>

function keyDateUrgency(dateStr) {

    today.setHours(0, 0, 0, 0);
    const target = new Date(dateStr + 'T00:00:00');

function formatRelative(iso) {
    const d = new Date(iso);
    const now = Date.now();
    const diff = (now - d.getTime()) / 1000;
    if (diff < 60)
        return 'just now';
    if (diff < 3600)
        return Math.round(diff / 60) + 'min ago';
    if (diff < 86400)
        return Math.round(diff / 3600) + 'h ago';
    if (diff < 604800)
        return Math.round(diff / 86400) + 'd ago';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function formatMeetingDate(dateStr) {
    if (!dateStr)

    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function formatMeetingDateLong(dateStr) {
    if (!dateStr)

}
