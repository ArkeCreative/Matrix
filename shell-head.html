<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>arke [matrix]</title>
<meta name="description" content="arke [matrix] — internal project management for Arke Creative. Design-led commercial fit-out.">
<style>
  :root {
    --font-ui: 'Century Gothic', system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, Menlo, monospace;
    --ink: #1C1F1E;
    --carmine: #8C002A;
    --chalk: #F4F3F1;
  }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-ui); background: #F4F3F1; color: #2A2E2C; }
  #root { min-height: 100vh; }
  input:focus, textarea:focus, select:focus, button:focus { outline: 2px solid #8C002A; outline-offset: -1px; }
  .am-splash {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #8C002A; z-index: 9999; transition: opacity 0.3s ease;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 10px 10px;
  }
  .am-splash.hide { opacity: 0; pointer-events: none; }
  .am-splash-mark {
    font-family: 'Century Gothic', system-ui, sans-serif;
    font-size: 44px; color: #E8ECEA; font-weight: 300;
    letter-spacing: 0.14em; text-transform: lowercase;
    display: flex; align-items: center; justify-content: center; gap: 11px;
  }
  .am-splash-bkt { color: #FFFFFF; font-weight: 400; }
  .am-splash-text {
    color: rgba(255,255,255,0.55); font-size: 10px; margin-top: 12px;
    text-align: center; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600;
  }
</style>
</head>
<body>
<div id="root">
  <div class="am-splash" id="splash">
    <div style="text-align:center">
      <div class="am-splash-mark"><span>arke</span><span class="am-splash-bkt">[</span><span>matrix</span><span class="am-splash-bkt">]</span></div>
      <div class="am-splash-text">Loading</div>
    </div>
  </div>
</div>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
// Detect if dependencies failed to load — show a clear error if so
window.addEventListener('load', function () {
  setTimeout(function () {

      document.getElementById('root').innerHTML =
        '<div style="max-width:480px;margin:80px auto;padding:24px;background:#fff;border:1px solid #E2E0DD;border-radius:6px;text-align:center;font-family:Century Gothic,system-ui,sans-serif">' +

        '<button onclick="window.location.reload()" style="padding:9px 18px;background:#8C002A;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;font-family:Century Gothic,sans-serif">Retry</button>' +
        '</div>';
    }
  }, 8000);
});
</script>
